app:
  name: aistock
  market_timezone: Asia/Shanghai
  data_dir: data

strategy:
  watchlist_size: 100
  rebalance_interval_minutes: 15
  top_n: 3
  symbols:
    - 300750.SZ
    - 688041.SH
    - 688111.SH

risk:
  max_daily_trades: 5
  max_symbols_per_trade: 3
  max_single_position_pct: 0.1
  max_daily_loss_pct: 0.03
  min_confidence_score: 0.6

model:
  primary_model: lightgbm
  llm_enabled: false
  llm_model_name: ""

data_source:
  primary_provider: tushare
  enable_news: false

portfolio:
  initial_cash: 100000
  transaction_cost_rate: 0.001
  slippage_rate: 0.0005

backtest:
  initial_cash: 100000
  transaction_cost_rate: 0.001
  slippage_rate: 0.0005
